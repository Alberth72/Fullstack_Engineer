services:
  backend:
    build:
      context: ../backend
    environment:
      NODE_ENV: development
      PORT: 4001
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AGENT_MOCK: ${AGENT_MOCK:-true}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN:-}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-600}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      TELEMETRY_API_BASE: http://backend:4001/api
    volumes:
      - ../backend:/app
      - backend_node_modules:/app/node_modules
      - backend_data:/app/data
    ports:
      - "4001:4001"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://localhost:4001/health',res=>process.exit(res.statusCode===200?0:1)).on('error',()=>process.exit(1))\""
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    command: npm run dev

  worker:
    profiles:
      - full
    build:
      context: ../backend
    environment:
      NODE_ENV: development
      PORT: 4002
      WORKER_PORT: 4002
      DATABASE_URL: postgres://fleet:fleet@postgres:5432/fleet
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      JSON_BODY_LIMIT: 2mb
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN:-}
    volumes:
      - ../backend:/app
      - backend_node_modules:/app/node_modules
      - backend_data:/app/data
    ports:
      - "4002:4002"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://localhost:4002/health',res=>process.exit(res.statusCode===200?0:1)).on('error',()=>process.exit(1))\""
        ]
      interval: 10s
      timeout: 5s
      retries: 12
    command: npm run dev:worker

  frontend:
    build:
      context: ../frontend
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_BASE: http://localhost:4001/api
      NEXT_PUBLIC_WS_URL: ws://localhost:4001/ws
    volumes:
      - ../frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    command: npm run dev

  simulator:
    profiles:
      - full
    build:
      context: ../backend
    environment:
      NODE_ENV: development
      TELEMETRY_API_BASE: http://backend:4001/api
      TELEMETRY_SIM_INTERVAL_MS: ${TELEMETRY_SIM_INTERVAL_MS:-2000}
      TELEMETRY_SIM_VEHICLES: ${TELEMETRY_SIM_VEHICLES:-6}
      TELEMETRY_SIM_SPREAD_KM: ${TELEMETRY_SIM_SPREAD_KM:-12}
      DATABASE_URL: postgres://fleet:fleet@postgres:5432/fleet
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    volumes:
      - ../backend:/app
    command: npm run simulate:telemetry

  postgres:
    profiles:
      - full
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: fleet
      POSTGRES_USER: fleet
      POSTGRES_PASSWORD: fleet
      TIMESCALEDB_TELEMETRY: "off"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fleet -d fleet"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    profiles:
      - full
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  backend_node_modules:
  frontend_node_modules:
  backend_data:
  postgres_data:
