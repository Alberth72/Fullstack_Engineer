name: deploy-terraform

on:
  workflow_run:
    workflows:
      - build-push-ecr
    branches:
      - main
    types:
      - completed
  workflow_dispatch:
    inputs:
      image_tag:
        description: "ECR image tag to deploy"
        required: false
        default: ""

env:
  AWS_REGION: us-east-1
  TF_STATE_BUCKET: fleet-telemetry-tfstate
  TF_STATE_KEY: fleet-telemetry/dev/terraform.tfstate
  TF_LOCK_TABLE: fleet-telemetry-tf-locks

jobs:
  terraform-apply:
    name: Terraform apply to AWS
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      id-token: write

    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Determine image tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.image_tag }}" ]; then
            echo "IMAGE_TAG=${{ inputs.image_tag }}" >> "$GITHUB_ENV"
          elif [ "${{ github.event_name }}" = "workflow_run" ] && [ -n "${{ github.event.workflow_run.head_sha }}" ]; then
            echo "IMAGE_TAG=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_ENV"
          else
            echo "IMAGE_TAG=${{ github.sha }}" >> "$GITHUB_ENV"
          fi

      - name: Terraform init
        working-directory: infra/terraform
        run: |
          terraform init \
            -input=false \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ env.TF_STATE_KEY }}" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ env.TF_LOCK_TABLE }}" \
            -backend-config="encrypt=true"

      - name: Terraform apply
        working-directory: infra/terraform
        env:
          TF_VAR_image_tag: ${{ env.IMAGE_TAG }}
          TF_VAR_mq_broker_password: ${{ secrets.MQ_BROKER_PASSWORD }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          TF_VAR_agent_mock: "true"
        run: |
          terraform apply -input=false -auto-approve \
            -var "image_tag=${TF_VAR_image_tag}" \
            -var "mq_broker_password=${TF_VAR_mq_broker_password}" \
            -var "db_password=${TF_VAR_db_password}" \
            -var "openai_api_key=${TF_VAR_openai_api_key}" \
            -var "agent_mock=${TF_VAR_agent_mock}"
