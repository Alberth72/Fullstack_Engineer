name: build-push-ecr

on:
  workflow_run:
    workflows:
      - project-ci
    branches:
      - main
    types:
      - completed
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  BACKEND_ECR_REPOSITORY: fleet-telemetry-dev

jobs:
  build-and-push:
    name: Build and push deployable images to ECR
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write

    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tags
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ] && [ -n "${{ github.event.workflow_run.head_sha }}" ]; then
            echo "IMAGE_TAG_SHA=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_ENV"
          else
            echo "IMAGE_TAG_SHA=${GITHUB_SHA}" >> "$GITHUB_ENV"
          fi
          echo "BACKEND_IMAGE_REPOSITORY=${{ steps.login-ecr.outputs.registry }}/${BACKEND_ECR_REPOSITORY}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile.ecs
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE_REPOSITORY }}:latest
            ${{ env.BACKEND_IMAGE_REPOSITORY }}:${{ env.IMAGE_TAG_SHA }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_BASE=/api
            NEXT_PUBLIC_WS_URL=
            BACKEND_INTERNAL_URL=http://backend.fleet.local:4001
          tags: |
            ${{ env.BACKEND_IMAGE_REPOSITORY }}:frontend-latest
            ${{ env.BACKEND_IMAGE_REPOSITORY }}:frontend-${{ env.IMAGE_TAG_SHA }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
